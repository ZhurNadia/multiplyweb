<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Весела таблиця множення | Гра для 1 класу</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* трохи зменшує випадкове виділення, але не заважає вводу */
        }

        body {
            background: linear-gradient(145deg, #1e7b8a 0%, #0f5c6b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* головна картка гри */
        .game-container {
            max-width: 650px;
            width: 100%;
            background: #fef9e8;
            border-radius: 80px 80px 70px 70px;
            box-shadow: 0 25px 35px rgba(0, 0, 0, 0.3), inset 0 1px 4px rgba(255, 255, 255, 0.8);
            overflow: hidden;
            transition: transform 0.2s ease;
            border: 4px solid #ffcf4a;
        }

        /* веселий верх */
        .game-header {
            background: #ffb347;
            padding: 20px 20px 15px 20px;
            text-align: center;
            color: white;
            text-shadow: 3px 3px 0 #c16f1a;
            border-bottom: 5px solid #ffdd88;
        }

        .game-header h1 {
            margin: 0;
            font-size: 2.3rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .game-header h1 span {
            background: white;
            border-radius: 60px;
            padding: 5px 12px;
            font-size: 1.9rem;
            color: #ff8c1a;
            text-shadow: none;
            box-shadow: inset 0 1px 4px #0002, 0 4px 0 #bd7a2a;
        }

        .score-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff0d4;
            margin-top: 15px;
            padding: 10px 25px;
            border-radius: 60px;
            color: #a55217;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .score-box, .best-box {
            background: #fdd48d;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: inset 0 0 0 2px white, 0 4px 8px rgba(0,0,0,0.1);
        }

        /* вибір таблиці (кнопки множників) */
        .multiplier-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 20px 20px 5px 20px;
            background: #fff4e6;
        }

        .num-btn {
            font-size: 2rem;
            font-weight: bold;
            background: #f5cd94;
            border: none;
            width: 75px;
            padding: 12px 0;
            border-radius: 60px;
            font-family: inherit;
            color: #4a2a0e;
            cursor: pointer;
            box-shadow: 0 7px 0 #a5662a;
            transition: 0.05s linear;
            text-align: center;
        }

        .num-btn.active {
            background: #f5a623;
            color: white;
            box-shadow: 0 3px 0 #a5662a;
            transform: translateY(2px);
        }

        .num-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #a5662a;
        }

        /* центральна ігрова зона */
        .question-card {
            background: #ffffffdd;
            margin: 10px 25px 20px 25px;
            background: #fff3e0;
            border-radius: 65px;
            padding: 20px;
            text-align: center;
            box-shadow: inset 0 0 0 5px #ffe3b3, 0 12px 18px rgba(0,0,0,0.1);
        }

        .big-question {
            font-size: 4.2rem;
            font-weight: bold;
            background: #fffaef;
            display: inline-block;
            padding: 20px 35px;
            border-radius: 80px;
            margin: 10px 0;
            box-shadow: 0 8px 0 #ccaa77;
            color: #3f2a10;
            letter-spacing: 8px;
        }

        .input-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 25px 0 15px;
        }

        .answer-input {
            font-size: 2rem;
            width: 160px;
            text-align: center;
            padding: 12px 5px;
            font-family: monospace;
            font-weight: bold;
            background: #fffff0;
            border: 4px solid #fbc96e;
            border-radius: 60px;
            outline: none;
            color: #2f4f4f;
        }

        .check-btn {
            background: #6fbf4c;
            border: none;
            font-size: 1.8rem;
            padding: 8px 30px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 7px 0 #367c1f;
            transition: 0.05s linear;
        }

        .check-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #367c1f;
        }

        .feedback {
            font-size: 1.8rem;
            font-weight: bold;
            min-height: 85px;
            padding: 12px;
            background: #e6dbbc;
            border-radius: 50px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .next-btn {
            background: #ffaa33;
            border: none;
            font-size: 1.5rem;
            padding: 8px 35px;
            border-radius: 40px;
            font-weight: bold;
            color: #382008;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
            box-shadow: 0 5px 0 #b4621a;
        }

        .next-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b4621a;
        }

        .reset-btn {
            background-color: #ff8a7a;
            box-shadow: 0 5px 0 #a33f2e;
            color: white;
            margin-left: 12px;
        }

        /* анімація */
        @keyframes bounce {
            0% { transform: scale(1);}
            80% { transform: scale(1.08);}
            100% { transform: scale(1);}
        }

        .correct-blink {
            animation: bounce 0.3s ease;
            background-color: #c8e6b5 !important;
        }

        .wrong-shake {
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%,100%{ transform: translateX(0);}
            25%{ transform: translateX(-6px);}
            75%{ transform: translateX(6px);}
        }

        footer {
            font-size: 0.9rem;
            text-align: center;
            background: #ffdca8;
            padding: 12px;
            color: #aa6f2c;
        }

        @media (max-width: 500px) {
            .big-question { font-size: 2.8rem; padding: 12px 20px; letter-spacing: 4px;}
            .answer-input { width: 120px; font-size: 1.6rem;}
            .num-btn { width: 60px; font-size: 1.5rem;}
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <div class="game-header">
        <h1>
            🐼 Таблиця множення
            <span>Грай!</span>
        </h1>
        <div class="score-area">
            <div class="score-box">🏆 Бали: <span id="scoreValue">0</span></div>
            <div class="best-box">⭐ Рекорд: <span id="bestValue">0</span></div>
        </div>
    </div>

    <div class="multiplier-buttons" id="buttonsPanel">
        <!-- кнопки 2 3 4 5 -->
        <button data-mult="2" class="num-btn">× 2</button>
        <button data-mult="3" class="num-btn">× 3</button>
        <button data-mult="4" class="num-btn">× 4</button>
        <button data-mult="5" class="num-btn">× 5</button>
    </div>

    <div class="question-card">
        <div style="font-size: 1.5rem; color:#c9862c;">🔢 Скільки буде?</div>
        <div class="big-question" id="questionText">2 × 3</div>
        <div class="input-area">
            <input type="number" id="answerInput" class="answer-input" placeholder="?" value="" inputmode="numeric">
            <button id="checkBtn" class="check-btn">✅ Перевірити</button>
        </div>
        <div class="feedback" id="feedbackMsg">
            🦊 Введи відповідь і натисни "Перевірити"!
        </div>
        <div style="display: flex; gap: 12px; justify-content: center; margin-top: 5px;">
            <button id="nextQuestionBtn" class="next-btn">🎲 Наступний приклад</button>
            <button id="resetGameBtn" class="next-btn reset-btn">🔄 Нова гра</button>
        </div>
    </div>
    <footer>
        🌟 Обери таблицю: 2, 3, 4 або 5. Відповідай правильно — отримуй бали!
    </footer>
</div>

<script>
    // ---------- ІГРОВА ЛОГІКА ----------
    // Можливі множники 2,3,4,5. Другий множник (1..10)
    // Поточний стан
    let currentMultiplier = 2;      // активна таблиця
    let currentSecond = 1;           // від 1 до 10
    let currentAnswer = 2;           // обчислений правильний результат
    let currentScore = 0;
    let bestScore = 0;
    
    // Завантажуємо рекорд з localStorage (якщо є)
    try {
        const savedBest = localStorage.getItem("multiplicationBestScore");
        if(savedBest !== null && !isNaN(parseInt(savedBest))) {
            bestScore = parseInt(savedBest);
        }
    } catch(e) { /* тиша */ }
    
    // DOM елементи
    const questionSpan = document.getElementById("questionText");
    const answerInput = document.getElementById("answerInput");
    const checkBtn = document.getElementById("checkBtn");
    const nextBtn = document.getElementById("nextQuestionBtn");
    const resetBtn = document.getElementById("resetGameBtn");
    const scoreSpan = document.getElementById("scoreValue");
    const bestSpan = document.getElementById("bestValue");
    const feedbackDiv = document.getElementById("feedbackMsg");
    
    // Кнопки множників
    const multBtns = document.querySelectorAll(".num-btn");
    
    // Оновлення відображення рекорду та рахунку
    function updateScoreUI() {
        scoreSpan.innerText = currentScore;
        bestSpan.innerText = bestScore;
    }
    
    // Зберегти рекорд
    function saveBestIfNeeded() {
        if(currentScore > bestScore) {
            bestScore = currentScore;
            bestSpan.innerText = bestScore;
            try {
                localStorage.setItem("multiplicationBestScore", bestScore);
            } catch(e) {}
        }
    }
    
    // Генерація нового випадкового прикладу для поточної таблиці (currentMultiplier)
    function generateRandomQuestion() {
        // другий множник від 1 до 10
        let newSecond = Math.floor(Math.random() * 10) + 1;
        currentSecond = newSecond;
        let correct = currentMultiplier * currentSecond;
        currentAnswer = correct;
        // оновлюємо текст питання
        questionSpan.innerText = `${currentMultiplier} × ${currentSecond}`;
    }
    
    // Скидання активної кнопки стилю
    function setActiveMultiplierButton(mult) {
        multBtns.forEach(btn => {
            const btnMult = parseInt(btn.getAttribute("data-mult"));
            if(btnMult === mult) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }
    
    // Зміна таблиці (множника)
    function setMultiplier(newMult) {
        if(currentMultiplier === newMult) return;
        currentMultiplier = newMult;
        // генеруємо новий випадковий приклад вже з новим множником
        generateRandomQuestion();
        // очищаємо поле, скидаємо фідбек до нейтрального (не ламаємо рахунок)
        answerInput.value = "";
        feedbackDiv.innerHTML = "🐣 Таблиця змінена! Відповідай і заробляй бали!";
        feedbackDiv.style.background = "#e6dbbc";
        feedbackDiv.classList.remove("correct-blink", "wrong-shake");
        setActiveMultiplierButton(newMult);
        // не обнуляємо бали (дитина може тренувати різні таблиці, збережемо бали, але рекорд збережений)
        // однак якщо хочете, щоб бали не обнулялися при зміні таблиці - це більш мотиваційно
        // Залишаємо бали! 
    }
    
    // Перевірка відповіді
    function checkAnswer() {
        let userValue = answerInput.value.trim();
        if(userValue === "") {
            feedbackDiv.innerHTML = "🐢 Напиши число у поле!";
            feedbackDiv.style.background = "#ffe0b5";
            return;
        }
        let userNumber = Number(userValue);
        if(isNaN(userNumber)) {
            feedbackDiv.innerHTML = "🤔 Введи число, наприклад 8";
            return;
        }
        
        if(userNumber === currentAnswer) {
            // ПРАВИЛЬНО!
            currentScore++;
            updateScoreUI();
            saveBestIfNeeded();
            // Приємна анімація та фідбек
            feedbackDiv.innerHTML = "🎉 ПРАВИЛЬНО! 🎉 +1 бал! Молодець! 🌟";
            feedbackDiv.style.background = "#c8e6c9";
            feedbackDiv.classList.add("correct-blink");
            setTimeout(() => {
                feedbackDiv.classList.remove("correct-blink");
            }, 400);
            // Автоматично генеруємо новий приклад, щоб дитина могла одразу відповідати далі
            generateRandomQuestion();
            answerInput.value = "";
            // Додатковий звуковий ефект? без звуку, але чудово
            // Невелика затримка для зміни? ні, все миттєво
            // Але треба очистити повідомлення після наступної перевірки? залишиться до наступної дії.
            // Для кращого досвіду, через 1.2 сек повертаємо нейтральний текст, але не затираємо відразу, щоб дитина бачила успіх.
            setTimeout(() => {
                if(feedbackDiv.innerHTML.includes("ПРАВИЛЬНО")) {
                    feedbackDiv.innerHTML = "✨ Чудово! Відповідай далі! ✨";
                    feedbackDiv.style.background = "#e6dbbc";
                }
            }, 1200);
        } else {
            // НЕПРАВИЛЬНО
            feedbackDiv.innerHTML = `😲 Ой! ${currentMultiplier} × ${currentSecond} = ${currentAnswer}. Спробуй ще раз! 😊`;
            feedbackDiv.style.background = "#ffe0b0";
            feedbackDiv.classList.add("wrong-shake");
            setTimeout(() => {
                feedbackDiv.classList.remove("wrong-shake");
            }, 400);
            // неправильна відповідь не обнуляє бали, але не додає. залишаємо те саме питання
            answerInput.value = "";
            answerInput.focus();
            // не змінюємо приклад, щоб дитина могла ввести правильну відповідь.
            // Але після натискання на 'наступне' чи повторної перевірки можна буде.
            // Також щоб допомогти: залишаємо неправильну спробу без зміни прикладу
        }
    }
    
    // Функція "Наступний приклад" - генерує новий випадковий приклад для поточного множника
    function nextQuestion() {
        generateRandomQuestion();
        answerInput.value = "";
        feedbackDiv.innerHTML = "🦄 Новий приклад! Введи відповідь.";
        feedbackDiv.style.background = "#e6dbbc";
        feedbackDiv.classList.remove("correct-blink", "wrong-shake");
        answerInput.focus();
    }
    
    // Повне скидання гри (обнулення рахунку, новий випадковий приклад, але таблицю не міняємо)
    function resetGame() {
        currentScore = 0;
        updateScoreUI();
        saveBestIfNeeded(); // рекорд залишається, але бали скинуті
        generateRandomQuestion();   // новий приклад на поточному множнику
        answerInput.value = "";
        feedbackDiv.innerHTML = "🔄 Гра перезапущена! Починай відповідати! 🎈";
        feedbackDiv.style.background = "#f3e5c9";
        feedbackDiv.classList.remove("correct-blink", "wrong-shake");
        answerInput.focus();
    }
    
    // Ініціалізація: стартові значення, рекорд UI
    function initGame() {
        currentMultiplier = 2;
        currentSecond = Math.floor(Math.random() * 10) + 1;
        currentAnswer = currentMultiplier * currentSecond;
        questionSpan.innerText = `${currentMultiplier} × ${currentSecond}`;
        answerInput.value = "";
        currentScore = 0;
        updateScoreUI();
        bestSpan.innerText = bestScore;
        setActiveMultiplierButton(2);
        feedbackDiv.innerHTML = "🐨 Обери таблицю (2,3,4,5) та давай грати!";
        answerInput.focus();
    }
    
    // Підписка на події
    function bindEvents() {
        checkBtn.addEventListener("click", () => {
            checkAnswer();
        });
        nextBtn.addEventListener("click", () => {
            nextQuestion();
        });
        resetBtn.addEventListener("click", () => {
            resetGame();
        });
        // натискання Enter у полі вводу
        answerInput.addEventListener("keypress", (e) => {
            if(e.key === "Enter") {
                e.preventDefault();
                checkAnswer();
            }
        });
        // кнопки вибору множника
        multBtns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                const mult = parseInt(btn.getAttribute("data-mult"));
                if(!isNaN(mult) && (mult === 2 || mult === 3 || mult === 4 || mult === 5)) {
                    setMultiplier(mult);
                    // додатково сфокусувати інпут
                    answerInput.focus();
                }
            });
        });
    }
    
    // додатковий захист: якщо дитина введе дуже велике число - ок, просто перевірка.
    // згенеруємо ще коректне оновлення при зміні таблиці, щоб currentAnswer завжди правильний.
    // Додаткове коригування generateRandomQuestion – використовує поточний множник.
    // Але setMultiplier викликає generateRandomQuestion(), все добре.
    // Також потрібно після зміни множника оновити currentAnswer явно.
    // generateRandomQuestion вже оновлює currentAnswer.
    // Перевизначимо generateRandomQuestion, щоб впевнитись.
    // для безпеки перепризначимо функцію:
    const originalGenerate = generateRandomQuestion;
    window.generateRandomQuestion = generateRandomQuestion; // просто щоб не зламати
    
    // фікс - щоб при виклику generateRandomQuestion використовував актуальний множник
    // вже вона так і робить. чудово.
    
    // маленьке налаштування для введення: дозволяємо тільки цифри, але input number робить це.
    // Запуск:
    initGame();
    bindEvents();
    
    // додатково: якщо дитина довго не натискає, нічого страшного.
    // також додамо приємний ефект при правильній відповіді - автоматичне очищення та новий приклад
    // але в checkAnswer ми вже після правильного викликаємо generateRandomQuestion.
    // єдине, щоб користувач не заплутався - після правильного одразу з'являється новий приклад.
    // це робить гру динамічнішою.
    
    // мікрофікс: якщо після правильної відповіді через setTimout змінюється повідомлення - це ок.
    // також зробимо, щоб фокус автоматично на полі вводу після перевірки, після наступного.
    // доробимо після checkAnswer фокус:
    const originalCheck = checkAnswer;
    // але ми не можемо перевизначити, просто додамо після виклику перевірки фокус.
    // правильніше обгорнути?
    // але checkAnswer вже викликається. Додамо наприкінці функції перевірки рядок focus. 
    // Перевизначимо метод безпечно:
    const superCheck = checkAnswer;
    window.checkAnswer = superCheck;
    // Просто додаємо в саму функцію нижче - але функція вже оголошена, ми можемо доповнити через monkey patch?
    // не будемо ускладнювати, додамо слухач, що після будь-якої перевірки ставити фокус на інпут.
    const originalCheckBtnListener = checkBtn;
    // краще просто додати окремий focus після кліку.
    checkBtn.addEventListener("click", () => {
        setTimeout(() => answerInput.focus(), 20);
    });
    nextBtn.addEventListener("click", () => {
        setTimeout(() => answerInput.focus(), 50);
    });
    resetBtn.addEventListener("click", () => {
        setTimeout(() => answerInput.focus(), 50);
    });
    multBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            setTimeout(() => answerInput.focus(), 30);
        });
    });
    // Додатковий стартовий фокус
    answerInput.focus();
    
    // Маленька підказка для мобільних пристроїв
    console.log("Гра готова! 🌈");
</script>
</body>
</html>
